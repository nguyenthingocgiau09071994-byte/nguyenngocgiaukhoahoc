name = "masterclass-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ─── Route: forward /api/* on the production domain to this Worker ─
routes = [
  { pattern = "nguyenngocgiau.com/api/*", zone_name = "nguyenngocgiau.com" }
]

# ─── D1 Database ───────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "masterclass-db"
database_id = "05e3423a-d94d-4e5d-ac3b-c4855d6e7589"

# ─── KV Namespace ───────────────────────────────────────────
[[kv_namespaces]]
binding = "KV"
id = "a065bc3f266f44e8a406ab8d5cd10ff8"

# ─── Environment Variables (non-secret) ────────────────────
[vars]
ADMIN_EMAILS = "admin@masterclass.vn,nguyenngocgiau.com@gmail.com,nguyenngocgiau@gmail.com,admin@nguyenngocgiau.com,giaunne@gmail.com,giau@nguyenngocgiau.com"

# ─── Secrets (set via `wrangler secret put`) ───────────────
# wrangler secret put JWT_SECRET
# wrangler secret put CLOUDFLARE_ACCOUNT_ID

# ─── Production Environment ────────────────────────────────
[env.production]
name = "masterclass-api"

[[env.production.d1_databases]]
binding = "DB"
database_name = "masterclass-db"
database_id = "05e3423a-d94d-4e5d-ac3b-c4855d6e7589"

[[env.production.kv_namespaces]]
binding = "KV"
id = "a065bc3f266f44e8a406ab8d5cd10ff8"
